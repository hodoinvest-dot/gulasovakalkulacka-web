<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pozadie (tmavá hnedá) -->
  <rect width="64" height="64" rx="12" fill="#2c1a14"/>

  <!-- Kotlík (telo) -->
  <path d="M 14 28 Q 14 48 32 50 Q 50 48 50 28 Z"
        fill="#1a1a1a" stroke="#4e2a1e" stroke-width="1.5"/>

  <!-- Okraj kotlíka -->
  <ellipse cx="32" cy="28" rx="18" ry="3.5" fill="#0a0a0a" stroke="#e67e22" stroke-width="1"/>

  <!-- Guláš (povrch) -->
  <ellipse cx="32" cy="27.5" rx="15" ry="2.5" fill="#b8471f"/>

  <!-- Bublinky gulášu -->
  <circle cx="26" cy="27" r="1.5" fill="#e67e22"/>
  <circle cx="34" cy="26.5" rx="1" ry="1" fill="#f39c12"/>
  <circle cx="40" cy="27.5" r="1.2" fill="#e67e22"/>

  <!-- Para (nad kotlíkom) -->
  <path d="M 24 22 Q 22 18 24 14 Q 26 10 24 6"
        fill="none" stroke="#e67e22" stroke-width="1.5"
        stroke-linecap="round" opacity="0.7"/>
  <path d="M 32 20 Q 30 16 32 12 Q 34 8 32 4"
        fill="none" stroke="#f39c12" stroke-width="1.5"
        stroke-linecap="round" opacity="0.8"/>
  <path d="M 40 22 Q 38 18 40 14 Q 42 10 40 6"
        fill="none" stroke="#e67e22" stroke-width="1.5"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Trojnožka (náznak) -->
  <line x1="10" y1="52" x2="18" y2="40" stroke="#8b6341" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="52" x2="46" y2="40" stroke="#8b6341" stroke-width="2" stroke-linecap="round"/>
</svg>
