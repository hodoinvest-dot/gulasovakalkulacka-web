<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>404 — Stránka nenájdená | Page not found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0; font-family: Georgia, serif;
      background: #fdfaf1; color: #2c1a14;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .box { max-width: 500px; }
    h1 { font-size: 4em; margin: 0; color: #4e2a1e; }
    h2 { color: #e67e22; }
    p { margin: 10px 0; }
    a {
      display: inline-block; margin-top: 20px; padding: 12px 24px;
      background: #e67e22; color: white; text-decoration: none;
      border-radius: 6px; font-weight: bold;
    }
    a:hover { background: #d35400; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2 id="t1">Stránka nenájdená</h2>
    <p id="t2">Zdá sa, že guláš, ktorý hľadáte, nie je v kotlíku.</p>
    <a href="/" id="t3">Späť na kalkulačku</a>
  </div>
  <script>
    (function(){
      var h = window.location.hostname;
      if (h.indexOf('.com') !== -1) {
        document.documentElement.lang = 'en';
        document.title = '404 — Page not found | Goulash Calculator';
        document.getElementById('t1').textContent = 'Page not found';
        document.getElementById('t2').textContent = 'Looks like the goulash you’re looking for isn’t in the cauldron.';
        document.getElementById('t3').textContent = 'Back to calculator';
      } else if (h.indexOf('.cz') !== -1) {
        document.documentElement.lang = 'cs';
        document.title = '404 — Stránka nenalezena | Gulášová Kalkulačka';
        document.getElementById('t1').textContent = 'Stránka nenalezena';
        document.getElementById('t2').textContent = 'Zdá se, že guláš, který hledáte, není v kotlíku.';
        document.getElementById('t3').textContent = 'Zpět na kalkulačku';
      }
    })();
  </script>
</body>
</html>
